<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网络设备进项查询</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #ECF0F4; color: #1A1A2E; padding: 12px; }
.header { background: #1A2332; color: #fff; padding: 16px; border-radius: 8px 8px 0 0; text-align: center; }
.header h1 { font-size: 18px; }
.header p { font-size: 12px; color: #8FA4B8; margin-top: 4px; }
.toolbar { background: #fff; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom:1px solid #DDE4EE; }
.toolbar input { flex:1; padding: 8px 12px; border: 1px solid #DDE4EE; border-radius: 6px; font-size: 14px; }
.toolbar button { margin-left: 8px; padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; background: #1565C0; color: #fff; font-weight: bold; }
.status { padding: 8px 12px; font-size: 12px; color: #5A6B7F; background: #E2E8F0; display: flex; justify-content: space-between; }
.table-wrap { background: #fff; border-radius: 0 0 8px 8px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
th { background: #E2E8F0; padding: 10px 8px; text-align: left; font-size: 12px; position: sticky; top: 0; white-space: nowrap; }
td { padding: 8px; border-bottom: 1px solid #F0F2F5; white-space: nowrap; }
tr:nth-child(even) { background: #F7F9FC; }
.negative { color: #C62828; font-weight: bold; }
.zero { color: #B0BEC5; }
.copy-btn { padding: 4px 10px; background: #00897B; color: #fff; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; }
.refresh-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #fff; border-top:1px solid #DDE4EE; border-radius: 0 0 8px 8px; font-size: 11px; color: #5A6B7F; }
@media (max-width: 480px) {
  body { padding: 4px; }
  .header h1 { font-size: 16px; }
  table { font-size: 12px; }
  th, td { padding: 6px 4px; }
}
</style>
</head>
<body>
<div class="header">
  <h1>📦 网络设备进项查询</h1>
  <p>数据实时同步 · 自动每30秒刷新</p>
</div>
<div class="toolbar">
  <input type="text" id="search" placeholder="🔍 搜索型号或详情…" oninput="renderTable()">
  <button onclick="fetchData()">🔄 刷新</button>
</div>
<div class="status">
  <span id="statusText">⏳ 加载中…</span>
  <span id="updateTime"></span>
</div>
<div class="table-wrap">
  <table>
    <thead>
      <tr><th>编码</th><th>税收分类</th><th>设备型号</th><th>产品详情</th><th>单位</th><th>数量</th><th>操作</th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div class="refresh-bar">
  <span id="countText"></span>
  <span>每30秒自动刷新</span>
</div>

<script>
const DATA_URL = "https://raw.githubusercontent.com/g850043976-ux/stock-sync/master/data.json";
let store = {};
let lastUpdate = null;

function fetchData() {
  document.getElementById("statusText").textContent = "⏳ 刷新中…";
  fetch(DATA_URL, { cache: "no-store" })
    .then(r => r.json())
    .then(data => {
      store = data;
      lastUpdate = new Date();
      document.getElementById("statusText").textContent = "🟢 在线";
      document.getElementById("updateTime").textContent = "更新于 " + lastUpdate.toLocaleTimeString();
      renderTable();
    })
    .catch(() => {
      document.getElementById("statusText").textContent = "🔴 离线（显示缓存）";
      renderTable();
    });
}

function renderTable() {
  const kw = document.getElementById("search").value.trim().toLowerCase();
  const entries = Object.entries(store);
  const filtered = kw ? entries.filter(([id, item]) => {
    const m = (item.model || "").toLowerCase();
    const i = (item.info || "").toLowerCase();
    const t = (item.tax || "").toLowerCase();
    return m.includes(kw) || i.includes(kw) || t.includes(kw);
  }) : entries;

  document.getElementById("countText").textContent = `共 ${filtered.length} 条记录`;
  let html = "";
  filtered.forEach(([id, item]) => {
    const num = item.num || 0;
    const cls = num < 0 ? "negative" : (num === 0 ? "zero" : "");
    html += `<tr>
      <td>${id}</td>
      <td>${esc(item.tax)}</td>
      <td>${esc(item.model)}</td>
      <td>${esc(item.info)}</td>
      <td>${esc(item.unit)}</td>
      <td class="${cls}">${num}</td>
      <td><button class="copy-btn" onclick="copyRow('${id}')">📋</button></td>
    </tr>`;
  });
  document.getElementById("tbody").innerHTML = html || '<tr><td colspan="7" style="text-align:center;color:#B0BEC5;">暂无数据</td></tr>';
}

function copyRow(id) {
  const item = store[id];
  if (!item) return;
  if ((item.num || 0) <= 0) {
    alert('库存数量为"0"或负数，请询问财务');
    return;
  }
  const text = [item.tax||"", item.info||"", item.model||"", item.unit||""].join(" ");
  navigator.clipboard.writeText(text).then(() => {
    alert("已复制：" + text);
  });
}

function esc(s) { return (s || "").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
